<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Projeto ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="overlay-dark" id="darkOverlay"></div>

  <main class="scene">
    <!-- ETAPA 1 -->
    <section id="intro" class="section active">
      <div class="love-container" id="loveContainer">
        <span class="love-letter l1">I</span>
        <span class="love-letter l2">L</span>
        <span class="love-letter l3">O</span>
        <span class="love-letter l4">V</span>
        <span class="love-letter l5">E</span>
      </div>

      <button id="startBtn" class="btn yes-main">Yes</button>

      <div id="heartText" class="heart-text hidden">❤️</div>
    </section>

    <!-- ETAPA 2 -->
    <section id="questionSection" class="section">
      <div id="pandaWrap" class="panda-wrap">
        <div id="panda" class="panda">
          <div class="ear left"></div>
          <div class="ear right"></div>
          <div class="face">
            <div class="glasses">
              <div class="glass left-glass"></div>
              <div class="bridge"></div>
              <div class="glass right-glass"></div>
            </div>
            <div class="eye-patch left-patch"></div>
            <div class="eye-patch right-patch"></div>
            <div class="eye left-eye"></div>
            <div class="eye right-eye"></div>
            <div class="nose"></div>
            <div class="mouth"></div>
          </div>
          <div class="body"></div>
          <div class="arm left-arm"></div>
          <div class="arm right-arm"></div>
        </div>
      </div>

      <div id="questionBox" class="question-box">
        <h1>você quer conhecer o amor da minha vida?</h1>
        <div class="buttons">
          <button class="btn q-btn" id="yes1">Yes</button>
          <button class="btn q-btn" id="yes2">Yes</button>
        </div>
      </div>
    </section>

    <!-- ETAPA 3 -->
    <section id="revealSection" class="section">
      <div class="reveal-content">
        <h1 class="reveal-title">Ela é o amor da minha vida 💖</h1>

        <div class="photo-area">
          <img src="foto.jpg" alt="Foto dela" class="girl-photo" id="girlPhoto" />
          <div class="panda-corner" id="pandaCorner">
            <div class="small-panda">
              <div class="ear left"></div>
              <div class="ear right"></div>
              <div class="face">
                <div class="glasses">
                  <div class="glass left-glass"></div>
                  <div class="bridge"></div>
                  <div class="glass right-glass"></div>
                </div>
                <div class="eye-patch left-patch"></div>
                <div class="eye-patch right-patch"></div>
                <div class="eye left-eye heart-eye">❤</div>
                <div class="eye right-eye heart-eye">❤</div>
                <div class="nose"></div>
                <div class="mouth smile"></div>
              </div>
            </div>
          </div>
        </div>

        <p class="final-text">e eu queria te mostrar isso de um jeito especial ✨</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
